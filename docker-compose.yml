version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    
  userservice:
    build: ./userservice
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    # environment:
    #   - DB_URL=jdbc:postgresql://postgres:5432/user_db
    #   - DB_USERNAME=postgres
    #   - DB_PASSWORD=postgres
  
  productservice:
    build: ./productservice
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    # environment:
    #   - DB_URL=jdbc:postgresql://postgres:5432/products_db
    #   - DB_USERNAME=postgres
    #   - DB_PASSWORD=postgres

  orderservice:
    build: ./orderservice
    ports:
      - "8083:8083"
    depends_on:
      - postgres
    # environment:
    #   - DB_URL=jdbc:postgresql://postgres:5432/orders_db
    #   - DB_USERNAME=postgres
    #   - DB_PASSWORD=postgres

  cartservice:
    build: ./cartservice
    ports:
      - "8084:8084"
    depends_on:
      - postgres
    # environment:
    #   - DB_URL=jdbc:postgresql://postgres:5432/orders_db
    #   - DB_USERNAME=postgres
    #   - DB_PASSWORD=postgres

  apigateway:
    build: ./apigateway
    ports:
      - "8080:8080"
    depends_on:
      - userservice
      - productservice
      - orderservice
      - cartservice